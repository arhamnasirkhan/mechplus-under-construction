<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MechPlus Auto Care</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      color: #00ff88;
    }

    p {
      font-size: 18px;
      color: #cccccc;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      background: #222;
      border: 1px solid #00ff88;
      border-radius: 20px;
      margin-top: 20px;
      font-size: 14px;
    }

    .loader {
      margin: 30px auto;
      border: 5px solid #333;
      border-top: 5px solid #00ff88;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    footer {
      margin-top: 30px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚧 MechPlus Auto Care</h1>
    <div class="loader"></div>

    <p>
      Our website is currently under construction.<br>
      We are working hard to launch something amazing for you.
    </p>

    <div class="badge">Coming Soon</div>

    <footer>
      © 2026 MechPlus Auto Care. All rights reserved.
    </footer>
  </div>
</body>
</html>
